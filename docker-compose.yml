services:
  media-service:
    image: ghcr.io/simsimopen/sim-sim-media-service:latest
    container_name: media-service
    env_file:
      - .env
    environment:
      - TZ=Asia/Tashkent
      - SPRING_PROFILES_ACTIVE=prod
    command: [
      "java",
      "-Duser.timezone=Asia/Tashkent",
      "-Xms128m",
      "-Xmx256m",
      "-XX:+UseG1GC",
      "-XX:MaxGCPauseMillis=200",
      "-XX:MaxMetaspaceSize=96m",
      "-jar",
      "app.jar"
    ]
    deploy:
      resources:
        limits:
          cpus: '2.0'          # Limit to 1 CPU core
          memory: 1400M         # Hard limit (container killed if exceeded)
        reservations:
          cpus: '1.0'          # Guaranteed CPU allocation
          memory: 768M
    restart: always
    networks:
      - simsim
networks:
  simsim:
    name: simsim
    external: true